<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elementum — Tabla Periódica Interactiva</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta property="og:title" content="Elementum — Tabla Periódica Interactiva">
  <meta property="og:description" content="Tabla periódica interactiva con capas de visualización: categorías, bloques, propiedades periódicas y tipos de enlace.">
  <meta property="og:image" content="https://juangrunge.github.io/elementum/assets/og-image.png">
  <meta property="og:url" content="https://juangrunge.github.io/elementum/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Exo+2:wght@300;400;500;600;700&family=Cabin:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/table.css" />
  <link rel="stylesheet" href="css/layers.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <svg class="header-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.2" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <rect x="5" y="5" width="90" height="90" rx="10" fill="#111827"/>
        <rect x="5" y="5" width="90" height="90" rx="10" fill="none" stroke="#00d4ff" stroke-width="3" filter="url(#glow-soft)"/>
        <text x="12" y="22" font-family="'JetBrains Mono',monospace" font-size="11" fill="rgba(0,212,255,0.75)" font-style="italic" filter="url(#glow-soft)">Z</text>
        <text x="50" y="62" text-anchor="middle" font-family="'Exo 2',sans-serif" font-size="38" font-weight="700" fill="#00d4ff" filter="url(#glow-strong)">Em</text>
        <text x="50" y="76" text-anchor="middle" font-family="'Exo 2',sans-serif" font-size="9" fill="rgba(0,212,255,0.75)" letter-spacing="1" filter="url(#glow-soft)">Elementum</text>
      </svg>
      <div class="header-text">
        <h1 class="site-title">Elementum</h1>
        <p class="site-subtitle">TABLA PERIÓDICA INTERACTIVA</p>
      </div>
    </div>
  </header>

  <!-- ── Layer Toggle Bar ───────────────────────────────────────────────── -->
  <nav id="layer-bar" aria-label="Capas de visualización"></nav>

  <!-- ── Legend: JS moves this inside #main-table on desktop ──────────── -->
  <aside id="legend-panel" aria-label="Leyenda"></aside>

  <!-- ── Main Content ──────────────────────────────────────────────────── -->
  <main>

    <!-- Main periodic table grid (periods 1–7, groups 1–18) -->
    <div id="main-table" role="grid" aria-label="Tabla periódica"></div>

    <!-- Lanthanide / Actinide f-block rows -->
    <div id="fblock-container" aria-label="Lantánidos y Actínidos"></div>

  </main>

  <!-- ── Detail Panel (slide-in from right) ─────────────────────────────── -->
  <aside id="detail-panel" aria-label="Detalle del elemento" aria-hidden="true">
    <div class="panel-close-bar">
      <button id="panel-close" aria-label="Cerrar panel">✕</button>
    </div>
    <div id="panel-content"></div>
  </aside>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer>
    <div class="footer-inner">
      <div class="footer-qr">
        <img src="assets/qr.svg" alt="QR Elementum" class="qr-image" role="button" tabindex="0" title="Ver QR ampliado" />
        <span class="qr-label">Abrir en móvil</span>
      </div>
      <span class="footer-text">
        Herramienta de estudio &nbsp;·&nbsp;
        <a href="https://github.com/JuanGrunge" target="_blank" rel="noopener">JuanGrunge Develop</a>
        &nbsp;·&nbsp; UTEM 2026
      </span>
    </div>
  </footer>

  <!-- ── QR Modal ───────────────────────────────────────────────────────── -->
  <div id="qr-modal" aria-hidden="true" role="dialog" aria-label="QR Elementum">
    <div id="qr-modal-backdrop"></div>
    <div id="qr-modal-content">
      <img src="assets/qr.svg" alt="QR Elementum" id="qr-modal-image" />
      <p id="qr-modal-label">Escanea para abrir Elementum en tu móvil</p>
      <button id="qr-modal-close" aria-label="Cerrar">✕</button>
    </div>
  </div>

  <!-- ── Scripts (order matters: data → render → layers → tooltip) ─────── -->
  <script src="js/data.js"></script>
  <script src="js/tooltip.js"></script>
  <script src="js/render.js"></script>
  <script src="js/layers.js"></script>
  <script src="js/qr.js"></script>

</body>
</html>
